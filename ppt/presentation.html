<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 발표 - 나다커피</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #presentation-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #slide-canvas {
            width: 1920px;
            height: 1080px;
            background-color: #fff;
            position: absolute;
            transform-origin: center center;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .slide-frame {
            width: 1920px;
            height: 1080px;
            border: none;
            display: block;
        }

        .slide-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* 컨트롤 바 - 기본 숨김, hover시 표시 */
        #controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(20, 20, 20, 0.92);
            padding: 10px 22px;
            border-radius: 50px;
            color: white;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        #controls:hover,
        body:hover #controls {
            opacity: 1;
            pointer-events: all;
        }

        /* 마우스 움직임으로 컨트롤 표시 (JS로 제어) */
        #controls.visible {
            opacity: 1;
            pointer-events: all;
        }

        button {
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            padding: 7px 16px;
            cursor: pointer;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        button:hover {
            background: #FFD400;
            color: #000;
            border-color: #FFD400;
        }

        .btn-edge {
            background: #1a1a1a;
            border-color: #555;
            font-size: 0.8rem;
        }

        .btn-edge:hover {
            background: #FFD400;
            color: #000;
            border-color: #FFD400;
        }

        #progress {
            font-size: 0.9rem;
            font-weight: 700;
            color: #aaa;
            min-width: 60px;
            text-align: center;
            letter-spacing: 1px;
        }

        .divider {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.15);
            margin: 0 4px;
        }
    </style>
</head>

<body>

    </div>

        <button class="btn-edge" onclick="firstSlide()" title="맨 처음으로">⏮ 처음</button>
        <button onclick="prevSlide()">◀ 이전</button>
        <span id="progress">1 / 0</span>
        <button onclick="nextSlide()">다음 ▶</button>
        <button class="btn-edge" onclick="lastSlide()" title="맨 끝으로">끝 ⏭</button>

        <button onclick="toggleFullScreen()">⛶ 전체화면</button>

            { type: 'html', src: BASE_PPT + 'ts_final_06.html', label: 'TS Final 06' },
            { type: 'html', src: BASE_PPT + 'future_roadmap_01.html', label: 'Future Roadmap 01' },
            { type: 'html', src: BASE_PPT + 'future_roadmap_02.html', label: 'Future Roadmap 02' },
            { type: 'html', src: BASE_PPT + 'future_roadmap_03.html', label: 'Future Roadmap 03' },
            { type: 'html', src: BASE_PPT + 'future_roadmap_04.html', label: 'Future Roadmap 04' }
        ];

        let currentIndex = 0;
        let hideTimer = null;
        const canvas = document.getElementById('slide-canvas');
        const progress = document.getElementById('progress');
        const controls = document.getElementById('controls');

        function fitToScreen() {
            const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            canvas.style.transform = `scale(${scale})`;
        }

        function renderSlide() {
            const slide = slides[currentIndex];
            canvas.innerHTML = '';

            if (slide.type === 'html' || slide.type === 'url') {
                const iframe = document.createElement('iframe');
                iframe.src = slide.src;
                iframe.className = 'slide-frame';
                canvas.appendChild(iframe);
            } else if (slide.type === 'img') {
                const img = document.createElement('img');
                img.src = slide.src;
                img.className = 'slide-img';
                canvas.appendChild(img);
            }

            progress.innerText = `${currentIndex + 1} / ${slides.length}`;
            fitToScreen();
        }

        function firstSlide() { currentIndex = 0; renderSlide(); }
        function lastSlide() { currentIndex = slides.length - 1; renderSlide(); }
        function nextSlide() { if (currentIndex < slides.length - 1) { currentIndex++; renderSlide(); } }
        function prevSlide() { if (currentIndex > 0) { currentIndex--; renderSlide(); } }

        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        // 마우스 움직임 시 컨트롤 표시, 2초 후 자동 숨김
        document.addEventListener('mousemove', () => {
            controls.classList.add('visible');
            clearTimeout(hideTimer);
            hideTimer = setTimeout(() => controls.classList.remove('visible'), 2000);
        });

        window.addEventListener('resize', fitToScreen);
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
            if (e.key === 'Home') firstSlide();
            if (e.key === 'End') lastSlide();
            if (e.key === 'f' || e.key === 'F') toggleFullScreen();
        });

        renderSlide();
    </script>
</body>

</html>
